# SwiftLint configuration for Shotgun
# Run with `swiftlint` (installed via `make bootstrap`).

included:
  - Shotgun
  - ShotgunTests

excluded:
  - .build
  - DerivedData

disabled_rules:
  - todo                       # we intentionally ship TODOs in the scaffold
  - trailing_comma

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - sorted_imports
  - unneeded_parentheses_in_closure_argument

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 350
  error: 500

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length: 2
  excluded: [id, db, to, at, ok]

force_cast: warning
force_try: warning
